<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soredemo deterministic fixture</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="sticky-header">
      <strong>Soredemo Fixture</strong>
      <span id="click-count" aria-live="polite">Clicks: 0</span>
    </header>

    <main data-testid="demo-ready">
      <section class="hero" aria-labelledby="fixture-title">
        <p class="eyebrow">Deterministic local application</p>
        <h1 id="fixture-title">Project dashboard</h1>
        <p>Stable controls for browser capture and composition acceptance tests.</p>
        <div class="actions gate-targets">
          <button
            id="preview-analytics"
            type="button"
            data-testid="static-target"
            data-application-clicks="0"
          >
            Preview analytics
          </button>
          <button
            id="growing-hover-target"
            class="growing-button"
            type="button"
            data-testid="hover-target"
            data-application-clicks="0"
          >
            Growing hover target
          </button>
        </div>
        <div class="actions">
          <button id="new-project" class="primary" type="button" data-testid="new-project">
            New project
          </button>
        </div>
        <div class="capture-probe" data-capture-probe aria-hidden="true">
          <div class="capture-probe-marker"></div>
        </div>
      </section>

      <div class="scroll-spacer" aria-hidden="true"></div>

      <section id="project-form-panel" class="panel" aria-labelledby="new-project-title" hidden>
        <h2 id="new-project-title">Create a project</h2>
        <form id="project-form">
          <label for="project-name">Project name</label>
          <input id="project-name" name="project-name" autocomplete="off" />
          <button class="primary" type="submit" data-testid="create-project">
            Create project
          </button>
        </form>
      </section>

      <section
        id="result"
        class="panel result"
        aria-live="polite"
        data-testid="project-created"
        hidden
      ></section>

      <section id="navigation-result" class="panel result" data-testid="navigation-result" hidden>
        <h2>Project flow completed</h2>
      </section>

      <section class="panel analytics" aria-labelledby="analytics-heading">
        <p class="eyebrow">Result reveal target</p>
        <h2 id="analytics-heading">Analytics</h2>
        <p id="analytics-status">No preview requested yet.</p>
      </section>

      <section class="panel event-panel" aria-labelledby="event-log-title">
        <h2 id="event-log-title">Event log</h2>
        <ol id="event-log"></ol>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
